<!-- 파일 위치: pages/flashcard.html -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="영단어 플래시카드로 단어를 외우고, 외웠어요/다시 봐야해요로 체크하며 학습 결과를 확인하는 페이지입니다."
    />
    <title>영단어 플래시카드</title>
    <link rel="icon" href="../assets/icons/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      /* =========================================================
         이 페이지(flashcard.html)에서만 쓰는 전용 스타일이에요.
         색깔・둥근 정도・폰트는 전부 style.css의 :root 변수
         (--accent, --text-main, --text-subtle, --radius, --radius-sm, --font-body 등)를
         그대로 가져다 써서 사이트 전체 톤과 어긋나지 않게 했어요.
         ========================================================= */

      .flashcard-app {
        max-width: 560px;
        margin: 0 auto;
      }

      .screen {
        display: none;
        animation: fade 0.28s ease;
      }
      .screen.active {
        display: block;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 범위 설정 화면 */
      .field {
        margin-bottom: 1.1rem;
      }
      .field label {
        display: block;
        font-weight: 700;
        margin-bottom: 0.45rem;
        color: var(--text-subtle);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .row .sep {
        font-weight: 800;
        color: var(--text-subtle);
      }
      .flashcard-app input[type="number"] {
        width: 100%;
        height: 52px;
        border-radius: var(--radius-sm);
        border: 2px solid rgba(124, 108, 246, 0.24);
        background: rgba(255, 255, 255, 0.84);
        padding: 0 14px;
        font-size: 1rem;
        font-family: var(--font-body);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .flashcard-app input:focus {
        border-color: var(--accent-strong);
        box-shadow: 0 0 0 4px rgba(124, 108, 246, 0.12);
      }
      .hint {
        font-size: 0.85rem;
        color: var(--text-subtle);
        margin-top: 0.4rem;
      }

      .msg {
        display: none;
        margin-top: 0.9rem;
        padding: 0.85rem 0.95rem;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
      }
      .msg.show {
        display: block;
      }
      .msg.error {
        background: #fff1f3;
        color: #b02a37;
      }
      .msg.notice {
        background: #eef4ff;
        color: #204e9d;
      }

      .btn-primary {
        width: 100%;
        min-height: 52px;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        box-shadow: 0 10px 22px rgba(94, 139, 255, 0.34);
        border: 2px solid rgba(255, 255, 255, 0.78);
        border-radius: var(--radius-sm);
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.15s ease, filter 0.15s ease;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      .btn-sub {
        width: 100%;
        min-height: 48px;
        margin-top: 0.75rem;
        color: var(--text-main);
        background: rgba(124, 108, 246, 0.12);
        border: 1px solid rgba(124, 108, 246, 0.25);
        border-radius: var(--radius-sm);
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .btn-sub:hover {
        background: rgba(124, 108, 246, 0.18);
      }

      /* 진행률 */
      .flashcard-progress {
        margin-bottom: 1rem;
      }
      .progress-text {
        text-align: center;
        font-weight: 700;
        color: var(--text-subtle);
        margin-bottom: 0.5rem;
      }
      .progress-bar-bg {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(124, 108, 246, 0.15);
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.3s ease;
      }

      /* 카드 */
      .flashcard-box {
        min-height: 260px;
        padding: 2rem;
        display: grid;
        place-items: center;
        text-align: center;
        border-radius: var(--radius);
        cursor: pointer;
        background: rgba(255, 255, 255, 0.45);
        box-shadow: var(--shadow);
        margin-bottom: 1rem;
      }
      .flashcard-word {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800;
        color: var(--text-main);
      }
      .flashcard-meaning {
        font-size: 1.1rem;
        color: var(--text-subtle);
        margin-top: 0.8rem;
      }

      .flashcard-nav-row,
      .flashcard-mark-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .flashcard-nav-row {
        margin-bottom: 0.75rem;
      }
      .flashcard-nav-row button,
      .flashcard-mark-row button {
        flex: 1;
        min-width: 110px;
        border: none;
        border-radius: 999px;
        padding: 0.85rem 1rem;
        font-weight: 800;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.75);
        box-shadow: 0 8px 20px rgba(87, 105, 165, 0.12);
      }
      .flashcard-nav-row button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .mark-unsure {
        background: rgba(220, 53, 69, 0.12) !important;
        color: #b02a37;
      }
      .mark-unsure.active {
        background: #dc3545 !important;
        color: #fff;
      }
      .mark-known {
        background: rgba(40, 167, 69, 0.12) !important;
        color: #1f7a37;
      }
      .mark-known.active {
        background: #28a745 !important;
        color: #fff;
      }

      /* 결과 화면 */
      .result-message {
        text-align: center;
        font-size: 1.2rem;
        font-weight: 800;
        margin: 0.2rem 0 1.3rem;
        color: var(--text-main);
      }

      .result-summary {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
        background: rgba(255, 255, 255, 0.4);
        border-radius: var(--radius);
        padding: 1.25rem;
      }

      .ring-wrap {
        position: relative;
        width: 140px;
        height: 140px;
        flex-shrink: 0;
        margin: 0 auto;
      }
      .ring-outer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(rgba(148, 163, 184, 0.28) 0% 100%);
        transition: background 0.4s ease;
      }
      .ring-inner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 104px;
        height: 104px;
        border-radius: 50%;
        background: var(--surface-strong);
        display: grid;
        place-items: center;
        text-align: center;
      }
      .ring-count {
        font-size: 1.35rem;
        font-weight: 800;
        color: var(--text-main);
      }
      .ring-percent {
        font-size: 0.85rem;
        color: var(--text-subtle);
        margin-top: 2px;
      }

      .result-stats {
        flex: 1;
        min-width: 180px;
        display: grid;
        gap: 0.5rem;
      }
      .result-stat-row {
        display: flex;
        justify-content: space-between;
        padding: 0.6rem 0.2rem;
        border-bottom: 1px solid rgba(124, 108, 246, 0.15);
      }
      .result-stat-row .label {
        color: var(--text-subtle);
      }
      .result-stat-row .value {
        font-weight: 800;
      }
      .result-stat-row.known .value {
        color: #1f7a37;
      }
      .result-stat-row.unsure .value {
        color: #b02a37;
      }

      .review-title {
        font-weight: 800;
        color: var(--text-main);
        margin: 1.4rem 0 0.7rem;
      }
      .review-list {
        display: grid;
        gap: 0.6rem;
      }
      .review-item {
        background: #fff5f5;
        border: 1px solid #f5c2c7;
        border-radius: var(--radius-sm);
        padding: 0.7rem 0.9rem;
        font-size: 0.9rem;
      }
      .review-item .eng {
        font-weight: 700;
        color: #b02a37;
      }
      .review-item .kor {
        color: var(--text-subtle);
        margin-top: 2px;
      }
      .review-item.skip {
        background: #fff8ec;
        border-color: #f5dfa6;
      }
      .review-item.skip .eng {
        color: #a9720b;
      }
      .review-empty {
        text-align: center;
        color: #28a745;
        font-weight: 700;
        padding: 0.8rem;
      }

      @media (max-width: 767px) {
        .result-summary {
          flex-direction: column;
          text-align: center;
        }
        .result-stats {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <header class="topbar glass">
      <div class="brand-wrap">
        <div class="brand-mark">📇</div>
        <div>
          <p class="eyebrow">학습 도구</p>
          <h1>영단어 플래시카드</h1>
        </div>
      </div>

      <nav class="gnb" aria-label="메인 내비게이션">
        <a class="nav-link" href="../index.html" data-page="index">메인</a>
        <a class="nav-link" href="game.html" data-page="game">머리 식히기</a>
        <a class="nav-link active" href="study.html" data-page="study">공부하자</a>
      </nav>
    </header>

    <main class="page-shell">
      <div class="flashcard-app">

        <!-- 화면 1: 단어 범위 선택 -->
        <section id="screen-setup" class="screen active glass card">
          <div class="section-title-row">
            <span class="title-emoji">📇</span>
            <h2>단어 범위 선택</h2>
          </div>

          <div class="field">
            <label for="startNum">단어 범위 (1 ~ 1800)</label>
            <div class="row">
              <input id="startNum" type="number" min="1" max="1800" value="1" inputmode="numeric" />
              <span class="sep">~</span>
              <input id="endNum" type="number" min="1" max="1800" value="1800" inputmode="numeric" />
            </div>
            <div class="hint">예) 1 ~ 100</div>
          </div>

          <div class="field">
            <label for="countNum">카드 수 (1 ~ 100)</label>
            <input id="countNum" type="number" min="1" max="100" value="10" inputmode="numeric" />
            <div class="hint">선택한 범위에서 지정한 개수만큼 카드가 만들어져요.</div>
          </div>

          <div id="setupMsg" class="msg"></div>

          <button id="startBtn" class="btn-primary" type="button">카드 보기</button>
        </section>

        <!-- 화면 2: 플래시카드 학습 -->
        <section id="screen-card" class="screen">
          <div class="flashcard-progress">
            <div class="progress-text" id="progressText">1 / 10</div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
          </div>

          <div id="flashcard" class="glass flashcard-box" role="button" tabindex="0" aria-label="카드를 눌러 뜻 보기">
            <div>
              <div id="flashcard-word" class="flashcard-word">범위를 설정하고 카드 보기를 눌러주세요.</div>
              <div id="flashcard-meaning" class="flashcard-meaning">카드를 눌러 뜻을 확인하세요.</div>
            </div>
          </div>

          <div class="flashcard-nav-row flashcard-controls">
            <button id="prevBtn" type="button" aria-label="이전 카드">← 이전</button>
            <button id="toggleBtn" type="button" aria-label="뜻 보기 또는 가리기">뜻 보기</button>
            <button id="nextBtn" type="button" aria-label="다음 카드">다음 →</button>
          </div>

          <div class="flashcard-mark-row flashcard-controls">
            <button id="unsureBtn" class="mark-unsure" type="button" aria-label="다시 봐야해요로 표시">✕ 다시 봐야해요</button>
            <button id="knownBtn" class="mark-known" type="button" aria-label="외웠어요로 표시">⭕ 외웠어요</button>
          </div>
        </section>

        <!-- 화면 3: 학습 결과 -->
        <section id="screen-result" class="screen">
          <div class="glass card">
            <div class="section-title-row">
              <span class="title-emoji">🎉</span>
              <h2>학습 결과</h2>
            </div>

            <p class="result-message" id="resultMessage"></p>

            <div class="result-summary">
              <div class="ring-wrap">
                <div class="ring-outer" id="ringOuter"></div>
                <div class="ring-inner">
                  <div>
                    <div class="ring-count" id="ringCount">0/0</div>
                    <div class="ring-percent" id="ringPercent">0%</div>
                  </div>
                </div>
              </div>

              <div class="result-stats">
                <div class="result-stat-row known">
                  <span class="label">외웠어요</span>
                  <span class="value" id="statKnown">0개</span>
                </div>
                <div class="result-stat-row unsure">
                  <span class="label">다시 봐야해요</span>
                  <span class="value" id="statUnsure">0개</span>
                </div>
                <div class="result-stat-row">
                  <span class="label">건너뜀</span>
                  <span class="value" id="statSkip">0개</span>
                </div>
              </div>
            </div>

            <h3 class="review-title">다시 봐야할 단어</h3>
            <div id="reviewList" class="review-list"></div>

            <button id="retrySameBtn" class="btn-primary" type="button">같은 범위로 다시 보기</button>
            <button id="restartBtn" class="btn-sub" type="button">처음으로 (범위 다시 설정)</button>
          </div>
        </section>

      </div>
    </main>

    <button class="floating-tutor" type="button" aria-label="AI 영어 튜터 열기">
      <span>AI 영어 튜터</span>
    </button>
    <!-- AI 영어 튜터 챗봇 창: 평소에는 hidden 속성으로 숨겨져 있다가,
         플로팅 버튼을 누르면 main.js가 hidden을 풀어서 화면에 보여줘요. -->
    <div id="tutor-panel" class="tutor-panel" hidden>
      <div class="tutor-panel-inner glass">
        <div class="tutor-panel-header">
          <div>
            <p class="tutor-panel-title">🤖 AI 영어 튜터</p>
            <p class="tutor-panel-hint">💡 새 단어로 다시 시작하려면 채팅창 안의 🔄 버튼을 눌러주세요</p>
          </div>
          <button id="tutor-close-btn" type="button" aria-label="AI 영어 튜터 닫기">✕</button>
        </div>
        <div class="tutor-panel-body">
          <!-- Dify에서 만든 영어 단어 챗봇이 여기에 표시돼요.
               무료 사용량 초과 시 안내 메시지 필요
               크레딧이 빨리 소진될 경우, Dify에 Google Gemini 등 자체 무료 API 키를 연결하는 방식으로 전환 가능 -->
          <iframe
            id="tutor-iframe"
            src="https://udify.app/chatbot/o3hLbj0Ut3vGTRB0"
            style="width: 100%; height: 100%"
            frameborder="0"
            allow="microphone"
            title="AI 영어 튜터 챗봇"
          ></iframe>
        </div>
      </div>
    </div>


    <footer class="site-footer glass">
      <p>바이브코딩 실습 예시 사이트 (교사 제작)</p>
      <a href="#" aria-label="피드백 및 문의">피드백/문의</a>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/words.js"></script>
    <script src="../js/flashcard.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
