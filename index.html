<!-- 파일 위치: index.html -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="슬기로운 학교 생활 대시보드. 급식, 게임, 공부 도구를 한 곳에서 쉽게 확인하세요."
    />
    <title>슬기로운 학교 생활</title>
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <header class="topbar glass">
      <div class="brand-wrap">
        <div class="brand-mark">🏫</div>
        <div>
          <p class="eyebrow">학교 생활 대시보드</p>
          <h1>슬기로운 학교 생활</h1>
        </div>
      </div>

      <nav class="gnb" aria-label="메인 내비게이션">
        <a class="nav-link active" href="index.html" data-page="index">메인</a>
        <a class="nav-link" href="pages/game.html" data-page="game">머리 식히기</a>
        <a class="nav-link" href="pages/study.html" data-page="study">공부하자</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="hero-grid">
        <article class="glass card fortune-card">
          <div class="section-title-row">
            <span class="title-emoji">🔮</span>
            <h2>오늘의 운세</h2>
          </div>
          <p class="fortune-subtitle">오늘 하루는 어떤 날일까요?</p>

          <div id="fortune-idle" class="fortune-idle">
            <button id="fortune-reveal-btn" type="button" class="fortune-reveal-btn">오늘의 운세 보기 🔮</button>
          </div>

          <div id="fortune-result" class="fortune-result" hidden>
            <div class="fortune-emoji" id="fortune-emoji">🍀</div>
            <p class="fortune-text" id="fortune-text"></p>

            <div class="fortune-extra">
              <div class="fortune-chip">
                <span class="fortune-chip-label">행운의 색</span>
                <span class="fortune-chip-value">
                  <span class="fortune-color-dot" id="fortune-color-dot"></span>
                  <span id="fortune-color-name"></span>
                </span>
              </div>
              <div class="fortune-chip">
                <span class="fortune-chip-label">행운의 아이템</span>
                <span class="fortune-chip-value" id="fortune-item"></span>
              </div>
            </div>

            <button id="fortune-reroll-btn" type="button" class="fortune-reroll-btn">그냥 재미로 다시 뽑기 🔁</button>
          </div>
        </article>

        <article class="glass card countdown-card">
          <div class="section-title-row">
            <span class="title-emoji">⏰</span>
            <h2 id="countdownLabel">하교까지 남은 시간</h2>
          </div>

          <div class="timer-setup">
            <div class="timer-mode-group" role="group" aria-label="시간 종류 선택">
              <button type="button" class="timer-mode-btn" data-mode="lunch" aria-pressed="false">점심</button>
              <button type="button" class="timer-mode-btn" data-mode="dismissal" aria-pressed="false">하교</button>
            </div>
            <input type="time" id="targetTimeInput" aria-label="목표 시각 입력" />
          </div>

          <div id="countdown" class="countdown-number">00:00:00</div>
          <p class="countdown-note">점심/하교 중 하나를 고르고 시각을 입력하면, 그 시각까지 남은 시간이 자동으로 표시돼요.</p>
        </article>
      </section>
    </main>

    <button class="floating-tutor" type="button" aria-label="AI 영어 튜터 열기">
      <span>AI 영어 튜터</span>
    </button>

    <!-- AI 영어 튜터 챗봇 창: 평소에는 hidden 속성으로 숨겨져 있다가,
         플로팅 버튼을 누르면 main.js가 hidden을 풀어서 화면에 보여줘요. -->
    <div id="tutor-panel" class="tutor-panel" hidden>
      <div class="tutor-panel-inner glass">
        <div class="tutor-panel-header">
          <div>
            <p class="tutor-panel-title">🤖 AI 영어 튜터</p>
            <p class="tutor-panel-hint">💡 새 단어로 다시 시작하려면 채팅창 안의 🔄 버튼을 눌러주세요</p>
          </div>
          <button id="tutor-close-btn" type="button" aria-label="AI 영어 튜터 닫기">✕</button>
        </div>
        <div class="tutor-panel-body">
          <!-- Dify에서 만든 영어 단어 챗봇이 여기에 표시돼요.
               무료 사용량 초과 시 안내 메시지 필요
               크레딧이 빨리 소진될 경우, Dify에 Google Gemini 등 자체 무료 API 키를 연결하는 방식으로 전환 가능 -->
          <iframe
            id="tutor-iframe"
            src="https://udify.app/chatbot/o3hLbj0Ut3vGTRB0"
            style="width: 100%; height: 100%"
            frameborder="0"
            allow="microphone"
            title="AI 영어 튜터 챗봇"
          ></iframe>
        </div>
      </div>
    </div>

    <footer class="site-footer glass">
      <p>바이브코딩 실습 예시 사이트 (교사 제작)</p>
      <a href="#" aria-label="피드백 및 문의">피드백/문의</a>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/fortune.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
